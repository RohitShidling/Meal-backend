openapi: 3.0.0
info:
  title: Meal Subscription Admin API
  description: API documentation for the Admin dashboard
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/admin
    description: Local Development Server
paths:
  /auth/login:
    post:
      summary: Admin login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Successful login
        '401':
          description: Unauthorized
